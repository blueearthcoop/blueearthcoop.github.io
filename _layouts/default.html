<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page:         #F5E6D0;
            --bg-card:         #FDF5E8;
            --bg-card-alt:     #FAF0E0;
            --text-heading:    #6B4226;
            --text-body:       #5A3E2B;
            --text-light:      #8B7355;
            --accent-gold:     #C48A2A;
            --accent-warm:     #D4A84B;
            --accent-dark:     #8B6530;
            --border-soft:     #E0CDB5;
            --border-accent:   #C48A2A;
            --white:           #FFFDF9;
            --shadow:          rgba(107, 66, 38, 0.08);
            --shadow-hover:    rgba(107, 66, 38, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Source Sans 3', 'Segoe UI', sans-serif;
            background: var(--bg-page);
            min-height: 100vh;
            color: var(--text-body);
            line-height: 1.7;
            font-size: 16px;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--text-heading);
            line-height: 1.3;
        }

        .site-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        .site-nav {
            background: var(--white);
            border-radius: 12px;
            padding: 12px 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px var(--shadow);
            flex-wrap: wrap;
            gap: 10px;
        }

        .site-nav .nav-brand {
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .site-nav .nav-logo {
            height: 45px;
            width: auto;
        }

        .site-nav .nav-links {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .site-nav .nav-links a {
            color: var(--text-body);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.92rem;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .site-nav .nav-links a:hover,
        .site-nav .nav-links a.active {
            background: var(--accent-gold);
            color: var(--white);
        }

        /* Page content */
        .page-content {
            background: var(--white);
            border-radius: 12px;
            padding: 36px;
            margin-bottom: 24px;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .page-content h1 {
            font-size: 2rem;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-soft);
        }

        .page-content h2 {
            font-size: 1.5rem;
            margin: 28px 0 14px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border-soft);
        }

        .page-content h3 {
            font-size: 1.15rem;
            margin: 18px 0 8px;
        }

        .page-content p {
            margin-bottom: 12px;
            font-size: 1.02rem;
        }

        .page-content a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .page-content a:hover {
            color: var(--accent-dark);
            text-decoration: underline;
        }

        .page-content ul, .page-content ol {
            margin: 10px 0 15px 25px;
        }

        .page-content li {
            margin-bottom: 6px;
        }

        .page-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 16px;
        }

        .card h3 {
            margin-top: 0;
            color: var(--accent-gold);
        }

        /* Buttons */
        .btn {
            display: inline-block;
            background: var(--accent-gold);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 12px 26px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Source Sans 3', sans-serif;
            text-decoration: none;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px var(--shadow-hover);
            text-decoration: none;
            color: var(--white);
        }

        .btn-outline {
            background: transparent;
            color: var(--accent-gold);
            border: 2px solid var(--accent-gold);
        }

        .btn-outline:hover {
            background: var(--accent-gold);
            color: var(--white);
        }

        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        /* Menu items */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
            margin-top: 14px;
        }

        .menu-item {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            gap: 14px;
            align-items: center;
            transition: box-shadow 0.2s ease;
        }

        .menu-item:hover {
            box-shadow: 0 4px 16px var(--shadow-hover);
        }

        .menu-item-image {
            width: 72px;
            height: 72px;
            border-radius: 8px;
            flex-shrink: 0;
            overflow: hidden;
            background: var(--bg-card-alt);
        }

        .menu-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-item-image img:hover {
            transform: scale(1.05);
        }

        .menu-item-content h3 {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1.02rem;
            font-weight: 700;
            margin: 0 0 3px;
            color: var(--text-heading);
        }

        .menu-item-content p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin: 0;
        }

        /* Hero banner */
        .hero {
            background: var(--white);
            color: var(--text-heading);
            padding: 36px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .hero h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            border: none;
            padding: 0;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-body);
        }

        .hero .disclaimer {
            font-size: 0.78rem;
            margin-top: 10px;
            color: var(--text-light);
        }

        /* Footer */
        .site-footer {
            background: var(--text-heading);
            color: var(--bg-card);
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .site-footer p {
            margin: 4px 0;
            font-size: 0.92rem;
        }

        .site-footer .footer-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .site-footer .small {
            font-size: 0.82rem;
            opacity: 0.75;
        }

        .site-footer a {
            color: var(--accent-warm);
            text-decoration: none;
        }

        .site-footer a:hover {
            text-decoration: underline;
        }

        /* Photo gallery grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 14px;
            margin: 16px 0;
        }

        .photo-grid img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .photo-grid img:hover {
            transform: scale(1.02);
        }

        /* Pull quote */
        .pull-quote {
            border-left: 4px solid var(--accent-gold);
            padding: 16px 24px;
            margin: 24px 0;
            background: var(--bg-card);
            border-radius: 0 8px 8px 0;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--text-heading);
        }

        .pull-quote cite {
            display: block;
            margin-top: 8px;
            font-size: 0.88rem;
            font-style: normal;
            color: var(--text-light);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 14px;
            border-radius: 50%;
            border: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .site-nav {
                flex-direction: column;
                text-align: center;
            }

            .hero h1 {
                font-size: 1.7rem;
            }

            .page-content {
                padding: 22px;
            }

            .page-content h1 {
                font-size: 1.6rem;
            }

            .menu-grid {
                grid-template-columns: 1fr;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="site-container">
        {% include nav.html %}
        {{ content }}
        {% include footer.html %}
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <img id="lightbox-img" src="" alt="">
    </div>

    <script>
        function openLightbox(src, alt) {
            var lb = document.getElementById('lightbox');
            var img = document.getElementById('lightbox-img');
            img.src = src;
            img.alt = alt;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
</body>
</html>
