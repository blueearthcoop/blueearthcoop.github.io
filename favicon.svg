  <!-- Green land masses -->
  <circle cx="16" cy="16" r="10" fill="#7ED321" opacity="0.8"/>
  <circle cx="12" cy="14" r="4" fill="#4A90E2"/>
  <circle cx="20" cy="18" r="3" fill="#4A90E2"/>
  <circle cx="16" cy="20" r="2" fill="#4A90E2"/>
  
  <!-- Simple sprout on top -->
  <ellipse cx="16" cy="6" rx="1.5" ry="4" fill="#7ED321"/>
  <ellipse cx="14" cy="7" rx="1" ry="3" fill="#7ED321" transform="rotate(-30 14 7)"/>
  <ellipse cx="18" cy="7" rx="1" ry="3" fill="#7ED321" transform="rotate(30 18 7)"/>
  
  <!-- Tiny cute face -->
